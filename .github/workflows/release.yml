# Builds release binaries when a v* tag is pushed and attaches them to a GitHub
# Release. Zero-dependency identity is preserved: only the system compiler +
# make are used to build; no third-party build actions.
name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Linux binaries are fully static (-static) so they run on any distro
        # regardless of glibc version; macOS has no static libSystem, so those
        # stay dynamically linked against the system libraries.
        include:
          - os: ubuntu-latest
            label: linux-x86_64
            ldflags: -static
          - os: ubuntu-24.04-arm
            label: linux-arm64
            ldflags: -static
          - os: macos-latest
            label: macos-arm64
            ldflags: ""
          - os: macos-15-intel
            label: macos-x86_64
            ldflags: ""
    steps:
      - uses: actions/checkout@v4

      - name: Build (release)
        run: |
          make clean
          make CFLAGS="-Wall -Wextra -std=c11 -O2" LDFLAGS="${{ matrix.ldflags }}"
          strip build/tspdf
          ./build/tspdf --version

      - name: Verify static link (Linux)
        if: runner.os == 'Linux'
        run: file build/tspdf | grep "statically linked"

      - name: Smoke test
        run: |
          ./build/tspdf merge tests/data/one_page.pdf tests/data/three_pages.pdf -o /tmp/merged.pdf
          ./build/tspdf info /tmp/merged.pdf

      - name: Package
        run: |
          ver="${GITHUB_REF_NAME}"
          dist="tspdf-${ver}-${{ matrix.label }}"
          mkdir -p "$dist"
          cp build/tspdf "$dist/"
          cp README.md LICENSE CHANGELOG.md "$dist/"
          tar -czf "${dist}.tar.gz" "$dist"
          sha256sum "${dist}.tar.gz" > "${dist}.tar.gz.sha256" 2>/dev/null \
            || shasum -a 256 "${dist}.tar.gz" > "${dist}.tar.gz.sha256"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tspdf-${{ matrix.label }}
          path: |
            tspdf-*.tar.gz
            tspdf-*.tar.gz.sha256
          if-no-files-found: error

  amalgamation:
    name: Build amalgamation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # qpdf is test-time only: `make amalgamation` uses it to conformance-check
      # the PDF produced by the example linked against the amalgamated sources.
      - name: Install qpdf
        run: sudo apt-get update && sudo apt-get install -y qpdf

      - name: Build and prove amalgamation
        run: make amalgamation

      - name: Package
        run: |
          ver="${GITHUB_REF_NAME}"
          dist="tspdf-amalgamation-${ver}"
          mkdir -p "$dist"
          cp build/amalgamation/tspdf.c build/amalgamation/tspdf.h LICENSE "$dist/"
          {
            echo "tspdf ${ver} single-file amalgamation."
            echo "Add tspdf.c and tspdf.h to your project and compile tspdf.c as C11:"
            echo "    cc -std=c11 -O2 -c tspdf.c"
            echo "Include \"tspdf.h\" from your code; link with -lm. Nothing else needed."
            echo "Generated by scripts/amalgamate.sh — https://github.com/be-lang/tspdf"
          } > "$dist/README"
          tar -czf "${dist}.tar.gz" "$dist"
          sha256sum "${dist}.tar.gz" > "${dist}.tar.gz.sha256"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tspdf-amalgamation
          path: |
            tspdf-amalgamation-*.tar.gz
            tspdf-amalgamation-*.tar.gz.sha256
          if-no-files-found: error

  release:
    name: Publish release
    needs: [build, amalgamation]
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/tspdf-*.tar.gz
            dist/tspdf-*.tar.gz.sha256
          generate_release_notes: true
          body: |
            See [CHANGELOG.md](https://github.com/be-lang/tspdf/blob/main/CHANGELOG.md) for details.
